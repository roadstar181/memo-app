<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>메모장</title>
<meta name="theme-color" content="#24231F" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --paper:#F5F4F0;
    --card:#FFFFFF;
    --ink:#24231F;
    --ink-soft:#6B6A63;
    --line:#E4E1D8;
    --accent:#E3A33D;      /* 형광펜 앰버 */
    --accent-ink:#8A5A12;
    --teal:#4F7869;        /* 카테고리 보조색 */
    --danger:#B54B3A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}

  /* ---------- Auth screen ---------- */
  #authScreen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .authCard{
    width:100%;
    max-width:360px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px 28px;
    text-align:center;
  }
  .authCard h1{
    font-size:22px;
    margin:0 0 6px;
    letter-spacing:-0.02em;
  }
  .authCard p{
    color:var(--ink-soft);
    font-size:13px;
    margin:0 0 24px;
  }
  .authCard input{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
    margin-bottom:10px;
    font-family:inherit;
    background:var(--paper);
  }
  .authCard input:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .btn{
    width:100%;
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:var(--ink);
    color:#fff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .btn:disabled{opacity:0.5; cursor:default;}
  .authMsg{
    margin-top:14px;
    font-size:12.5px;
    color:var(--teal);
    min-height:16px;
  }

  /* ---------- App shell ---------- */
  #appScreen{display:none; max-width:640px; margin:0 auto; padding-bottom:100px;}
  header{
    position:sticky; top:0; z-index:10;
    background:var(--paper);
    padding:18px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  .headRow{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .headRow h1{font-size:19px; margin:0; letter-spacing:-0.02em;}
  .iconBtn{
    background:none; border:none; cursor:pointer;
    color:var(--ink-soft); font-size:12px; font-family:inherit;
    padding:6px 10px; border-radius:8px;
  }
  .iconBtn:hover{background:var(--line);}
  .searchWrap{position:relative;}
  #searchInput{
    width:100%;
    padding:10px 14px 10px 34px;
    border:1px solid var(--line);
    border-radius:10px;
    font-size:14px;
    background:var(--card);
    font-family:inherit;
  }
  .searchWrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:0.4;}
  .chips{display:flex; gap:6px; overflow-x:auto; margin-top:12px; padding-bottom:2px;}
  .chip{
    flex:none;
    padding:6px 12px;
    border-radius:999px;
    background:var(--card);
    border:1px solid var(--line);
    font-size:12.5px;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
    font-family:inherit;
  }
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  #list{padding:14px 16px; display:flex; flex-direction:column; gap:10px;}
  .empty{
    text-align:center;
    color:var(--ink-soft);
    padding:60px 20px;
    font-size:13.5px;
    line-height:1.7;
  }

  .memo{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 14px 12px;
    display:flex;
    gap:12px;
    cursor:pointer;
  }
  .memo.completed .memoTitle, .memo.completed .memoPreview{
    opacity:0.45; text-decoration:line-through;
  }
  .checkWrap{padding-top:2px;}
  .checkbox{
    width:19px; height:19px;
    border:1.5px solid var(--line);
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex:none;
    background:var(--card);
  }
  .checkbox.checked{background:var(--teal); border-color:var(--teal);}
  .memoBody{flex:1; min-width:0;}
  .memoTop{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .titleWrap{position:relative; display:inline-block;}
  .memoTitle{
    font-size:15px; font-weight:600; margin:0;
    position:relative; z-index:1;
    letter-spacing:-0.01em;
  }
  .pin-highlight .memoTitle::before{
    content:"";
    position:absolute;
    left:-3px; right:-3px; bottom:1px; height:9px;
    background:var(--accent);
    opacity:0.55;
    transform:rotate(-1deg);
    z-index:-1;
    border-radius:3px;
  }
  .pinBtn{
    background:none; border:none; cursor:pointer;
    color:var(--line); flex:none; padding:2px;
  }
  .pinBtn.active{color:var(--accent);}
  .memoPreview{
    font-size:13px; color:var(--ink-soft);
    margin:4px 0 8px;
    overflow:hidden;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    line-height:1.5;
  }
  .memoMeta{display:flex; align-items:center; gap:8px; font-size:11px; color:var(--ink-soft);}
  .catTag{
    background:rgba(79,120,105,0.12);
    color:var(--teal);
    padding:2px 8px;
    border-radius:999px;
    font-weight:600;
  }

  /* ---------- FAB ---------- */
  #fab{
    position:fixed;
    right:20px; bottom:24px;
    width:54px; height:54px;
    border-radius:50%;
    background:var(--ink);
    color:#fff;
    border:none;
    font-size:26px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    display:flex; align-items:center; justify-content:center;
    z-index:20;
  }

  /* ---------- Editor sheet ---------- */
  #overlay{
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,0.35);
    z-index:30;
  }
  #sheet{
    position:fixed;
    left:0; right:0; bottom:0;
    background:var(--card);
    border-radius:20px 20px 0 0;
    max-width:640px;
    margin:0 auto;
    max-height:88vh;
    overflow-y:auto;
    padding:18px 18px 24px;
    z-index:31;
    transform:translateY(100%);
    transition:transform 0.25s ease;
  }
  #overlay.show{display:block;}
  #overlay.show #sheet{transform:translateY(0);}
  .sheetHead{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .sheetHead h2{font-size:16px; margin:0;}
  #titleInput{
    width:100%; border:none; font-size:18px; font-weight:700;
    font-family:inherit; margin-bottom:10px; padding:4px 0;
    background:transparent; outline:none;
  }
  #contentInput{
    width:100%; min-height:140px; border:none; resize:vertical;
    font-size:14.5px; line-height:1.7; font-family:inherit;
    outline:none; background:transparent; padding:4px 0;
  }
  .catRow{display:flex; gap:6px; flex-wrap:wrap; margin:12px 0 18px;}
  .catPick{
    padding:6px 12px; border-radius:999px; border:1px solid var(--line);
    font-size:12.5px; background:var(--paper); cursor:pointer; color:var(--ink-soft);
    font-family:inherit;
  }
  .catPick.active{background:var(--teal); border-color:var(--teal); color:#fff;}
  .sheetActions{display:flex; gap:8px;}
  .sheetActions .btn{flex:1;}
  .btnDanger{background:var(--danger);}
  .btnGhost{background:var(--paper); color:var(--ink); border:1px solid var(--line);}
</style>
</head>
<body>

<!-- ================= AUTH ================= -->
<div id="authScreen">
  <div class="authCard">
    <h1>메모장</h1>
    <p>이메일로 로그인 링크를 받아<br/>모든 기기에서 메모를 동기화하세요.</p>
    <input id="emailInput" type="email" placeholder="이메일 주소" autocomplete="email" />
    <button class="btn" id="sendLinkBtn">로그인 링크 받기</button>
    <div class="authMsg" id="authMsg"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="appScreen">
  <header>
    <div class="headRow">
      <h1>메모장</h1>
      <button class="iconBtn" id="logoutBtn">로그아웃</button>
    </div>
    <div class="searchWrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" placeholder="메모 검색" />
    </div>
    <div class="chips" id="chips"></div>
  </header>
  <div id="list"></div>
</div>

<button id="fab" style="display:none;">＋</button>

<!-- ================= EDITOR ================= -->
<div id="overlay">
  <div id="sheet">
    <div class="sheetHead">
      <h2 id="sheetTitle">새 메모</h2>
      <button class="iconBtn" id="closeSheetBtn">닫기</button>
    </div>
    <input id="titleInput" placeholder="제목" />
    <textarea id="contentInput" placeholder="내용을 입력하세요..."></textarea>
    <div class="catRow" id="catRow"></div>
    <div class="sheetActions">
      <button class="btn btnDanger" id="deleteBtn" style="display:none;">삭제</button>
      <button class="btn" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ⚠️ 아래 두 값을 Supabase 프로젝트 정보로 교체하세요.
const SUPABASE_URL = 'https://yfmpxrtjoizezzmtewus.supabase.co/rest/v1/';
const SUPABASE_ANON_KEY = 'sb_publishable_LOuVLVh2COX0GOwnU3r1ew_w0FEB-3e';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CATEGORIES = ['일반', '업무', '아이디어', '중요'];

let memos = [];
let activeFilter = '전체';
let searchTerm = '';
let editingId = null;
let editingPinned = false;
let selectedCategory = CATEGORIES[0];
let currentUser = null;
let channel = null;

const $ = (id) => document.getElementById(id);

// ---------- Auth ----------
$('sendLinkBtn').addEventListener('click', async () => {
  const email = $('emailInput').value.trim();
  if (!email) return;
  $('sendLinkBtn').disabled = true;
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });
  $('sendLinkBtn').disabled = false;
  $('authMsg').textContent = error ? '오류: ' + error.message : '이메일을 확인해 링크를 클릭하세요.';
});

$('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  window.location.reload();
});

supabase.auth.onAuthStateChange((_event, session) => {
  if (session?.user) {
    currentUser = session.user;
    showApp();
  }
});

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    showApp();
  }
}
init();

function showApp() {
  $('authScreen').style.display = 'none';
  $('appScreen').style.display = 'block';
  $('fab').style.display = 'flex';
  loadMemos();
  subscribeRealtime();
}

function subscribeRealtime() {
  if (channel) return;
  channel = supabase
    .channel('memos-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'memos', filter: `user_id=eq.${currentUser.id}` }, () => {
      loadMemos();
    })
    .subscribe();
}

// ---------- Data ----------
async function loadMemos() {
  const { data, error } = await supabase
    .from('memos')
    .select('*')
    .order('pinned', { ascending: false })
    .order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  memos = data || [];
  renderChips();
  renderList();
}

async function saveMemo() {
  const title = $('titleInput').value.trim();
  const content = $('contentInput').value.trim();
  if (!title && !content) return;

  if (editingId) {
    await supabase.from('memos').update({
      title, content, category: selectedCategory, updated_at: new Date().toISOString()
    }).eq('id', editingId);
  } else {
    await supabase.from('memos').insert({
      title, content, category: selectedCategory,
      pinned: false, completed: false, user_id: currentUser.id
    });
  }
  closeSheet();
  loadMemos();
}

async function deleteMemo() {
  if (!editingId) return;
  await supabase.from('memos').delete().eq('id', editingId);
  closeSheet();
  loadMemos();
}

async function togglePin(memo, ev) {
  ev.stopPropagation();
  await supabase.from('memos').update({ pinned: !memo.pinned }).eq('id', memo.id);
  loadMemos();
}

async function toggleComplete(memo, ev) {
  ev.stopPropagation();
  await supabase.from('memos').update({ completed: !memo.completed }).eq('id', memo.id);
  loadMemos();
}

// ---------- Render ----------
function renderChips() {
  const cats = ['전체', '핀고정', ...CATEGORIES];
  $('chips').innerHTML = cats.map(c =>
    `<button class="chip ${activeFilter === c ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  $('chips').querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => { activeFilter = btn.dataset.cat; renderChips(); renderList(); });
  });
}

function renderList() {
  let filtered = memos;
  if (activeFilter === '핀고정') filtered = filtered.filter(m => m.pinned);
  else if (activeFilter !== '전체') filtered = filtered.filter(m => m.category === activeFilter);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    filtered = filtered.filter(m => (m.title || '').toLowerCase().includes(t) || (m.content || '').toLowerCase().includes(t));
  }

  if (!filtered.length) {
    $('list').innerHTML = `<div class="empty">아직 메모가 없어요.<br/>오른쪽 아래 + 버튼으로 첫 메모를 남겨보세요.</div>`;
    return;
  }

  $('list').innerHTML = filtered.map(m => `
    <div class="memo ${m.completed ? 'completed' : ''}" data-id="${m.id}">
      <div class="checkWrap">
        <div class="checkbox ${m.completed ? 'checked' : ''}" data-action="check" data-id="${m.id}">
          ${m.completed ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>' : ''}
        </div>
      </div>
      <div class="memoBody">
        <div class="memoTop">
          <div class="titleWrap ${m.pinned ? 'pin-highlight' : ''}">
            <p class="memoTitle">${escapeHtml(m.title || '(제목 없음)')}</p>
          </div>
          <button class="pinBtn ${m.pinned ? 'active' : ''}" data-action="pin" data-id="${m.id}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="${m.pinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M12 17v5"/><path d="M9 3h6l1 6 3 3v2H5v-2l3-3z"/></svg>
          </button>
        </div>
        <p class="memoPreview">${escapeHtml(m.content || '')}</p>
        <div class="memoMeta">
          <span class="catTag">${m.category || '일반'}</span>
          <span class="mono">${formatDate(m.created_at)}</span>
        </div>
      </div>
    </div>
  `).join('');

  $('list').querySelectorAll('.memo').forEach(el => {
    el.addEventListener('click', (ev) => {
      if (ev.target.closest('[data-action]')) return;
      openSheet(memos.find(m => m.id === el.dataset.id));
    });
  });
  $('list').querySelectorAll('[data-action="pin"]').forEach(el => {
    el.addEventListener('click', (ev) => togglePin(memos.find(m => m.id === el.dataset.id), ev));
  });
  $('list').querySelectorAll('[data-action="check"]').forEach(el => {
    el.addEventListener('click', (ev) => toggleComplete(memos.find(m => m.id === el.dataset.id), ev));
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getMonth()+1}.${dt.getDate()}`;
}

// ---------- Sheet ----------
function renderCatRow() {
  $('catRow').innerHTML = CATEGORIES.map(c =>
    `<button type="button" class="catPick ${selectedCategory === c ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  $('catRow').querySelectorAll('.catPick').forEach(btn => {
    btn.addEventListener('click', () => { selectedCategory = btn.dataset.cat; renderCatRow(); });
  });
}

function openSheet(memo) {
  editingId = memo ? memo.id : null;
  $('sheetTitle').textContent = memo ? '메모 수정' : '새 메모';
  $('titleInput').value = memo ? memo.title : '';
  $('contentInput').value = memo ? memo.content : '';
  selectedCategory = memo ? (memo.category || CATEGORIES[0]) : CATEGORIES[0];
  $('deleteBtn').style.display = memo ? 'block' : 'none';
  renderCatRow();
  $('overlay').classList.add('show');
  setTimeout(() => $('titleInput').focus(), 100);
}

function closeSheet() {
  $('overlay').classList.remove('show');
  editingId = null;
}

$('fab').addEventListener('click', () => openSheet(null));
$('closeSheetBtn').addEventListener('click', closeSheet);
$('overlay').addEventListener('click', (e) => { if (e.target.id === 'overlay') closeSheet(); });
$('saveBtn').addEventListener('click', saveMemo);
$('deleteBtn').addEventListener('click', deleteMemo);
$('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; renderList(); });

// ---------- PWA ----------
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
